services:
  - type: web
    name: skin-cancer-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /

  - type: web
    name: skin-cancer-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: BACKEND_HOSTPORT
        fromService:
          name: skin-cancer-backend
          type: web
          property: hostport
